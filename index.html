<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#fef5e7;color:#3d2b1f;min-height:100vh;padding-bottom:100px}
.app-header{background:linear-gradient(135deg,#e85d04,#dc2f02);color:#fff;padding:14px 16px 12px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(220,47,2,.3)}

.staff-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:8px;font-size:12px;cursor:pointer}
.tab-bar{display:flex;gap:0;margin:8px 12px 0;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:600;border:none;background:transparent;color:#999;cursor:pointer}
.tab.active{background:linear-gradient(135deg,#e85d04,#dc2f02);color:#fff;box-shadow:0 2px 8px rgba(220,47,2,.2)}

.section-title .badge{background:#fef0e0;color:#e85d04;font-size:11px;padding:1px 8px;border-radius:8px;margin-left:auto}
.toolbar{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar button{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #fef0e0;background:#fff;color:#666;cursor:pointer;outline:none}

td.name{font-weight:600;color:#3d2b1f;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.seq{color:#999;font-size:11px;width:28px}
td.qty{font-weight:500}

.del-btn{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 6px}

.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px 2px;font-size:12px;color:#888}
.status-dot{width:8px;height:8px;border-radius:50%;background:#bbb;transition:all .3s}
.status-dot.listening{background:#dc2f02;animation:pulse .8s ease-in-out infinite}

#voiceCard{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin:12px;padding:14px 16px;display:none}

#voiceCard .analysis{background:#fffaf3;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.6;border-left:3px solid #e85d04}

.log-card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin:12px 12px 80px;padding:14px 16px}

.log-item .op-tag{color:#e85d04;font-size:10px;white-space:nowrap}
.fab{position:fixed;bottom:28px;right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#e85d04,#dc2f02);color:#fff;border:none;font-size:26px;box-shadow:0 4px 20px rgba(220,47,2,.35);cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center}
.fab.listening{box-shadow:0 4px 30px rgba(220,47,2,.6);animation:micPulse 1s ease-in-out infinite}

.fab-label{position:fixed;bottom:92px;right:20px;font-size:11px;color:#999;background:rgba(0,0,0,.06);padding:3px 10px;border-radius:10px;pointer-events:none}

.sp-wrap{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0}

.loc-picker{display:flex;flex-direction:column;gap:6px}

.account-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #fef5e7}
.account-item .info{display:flex;align-items:center;gap:8px}

.account-item .role-tag{font-size:10px;background:#fef0e0;color:#e85d04;padding:1px 6px;border-radius:6px}

#newLocConfirm{position:fixed;bottom:0;left:0;right:0;z-index:9997;background:#fff;border-radius:16px 16px 0 0;padding:20px;box-shadow:0 -4px 20px rgba(0,0,0,.15);display:none}
#newLocConfirm.show{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Input bar */
.input-bar{position:fixed;bottom:18px;left:16px;right:100px;z-index:98;display:flex;gap:6px;background:#fff;border:2px solid #fdd5b5;border-radius:28px;padding:4px 4px 4px 16px;box-shadow:0 2px 12px rgba(220,47,2,.15);align-items:center}
.input-bar input{flex:1;border:none;outline:none;font-size:14px;color:#3d2b1f;background:transparent;padding:8px 0;min-width:0}

.input-bar .send-btn:active{opacity:.8}
.input-bar .send-btn::before{content:'\0021d1'}
</style>

<body>
<!-- Login Screen -->

<script>
// ========== DATA LAYER ==========
var DB_KEY = 'liayi_pantry_data';
var APP_VERSION = 'V1.0.22';
var SUPABASE_URL = 'https://ndziepmmptcsrwiagdfa.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kemllcG1tcHRjc3J3aWFnZGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMTYwNzMsImV4cCI6MjA5OTg5MjA3M30.4PZqBreOxSCUsrV_7tY3_bjqH6EFKXMp0xK7z918uDs';
function sbGet(t,q){var h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};return fetch(SUPABASE_URL+'/rest/v1/'+t+(q?'?'+q:'?select=*'),{headers:h}).then(function(r){return r.json()})}
function sbPost(t,d){return fetch(SUPABASE_URL+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)})}
function sbDelete(t,f){return fetch(SUPABASE_URL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})}
function sbPatch(t,d,f){return fetch(SUPABASE_URL+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify(d)})}
async function refreshDB(){try{var a=await sbGet('accounts');var i=await sbGet('inventory','select=*&order=id.asc');var r=await sbGet('recipes','select=*&order=id.asc');var l=await sbGet('logs','select=*&order=id.desc&limit=20');var o=await sbGet('locations','select=*&order=id.asc');DB={accounts:a||[],inventory:i||[],recipes:r||[],logs:l||[],locations:(o||[]).map(function(x){return x.name}),nextInvId:9999,nextRecipeId:9999};if(DB.locations.indexOf('常温')===-1)DB.locations.unshift('常温');return true}catch(e){console.error('Supabase load error',e);return false}}


var SAVED_ACCOUNTS_KEY = 'liayi_saved_accounts';







function loadData(){
  try{var d=JSON.parse(localStorage.getItem(DB_KEY));if(d&&d.inventory&&d.recipes){return d}}catch(e){}setTimeout(function(){alert('\u26a0\ufe0f \u65e0\u6cd5\u52a0\u8f7d\u6570\u636e\uff1a\u4e91\u7aef\u548c\u672c\u5730\u90fd\u6ca1\u6709\u6570\u636e')},500);var d={accounts:[{username:'admin',password:'admin',role:'admin',name:'管理员'}],locations:['常温'],inventory:[],recipes:[],logs:[],nextInvId:1,nextRecipeId:1};
  localStorage.setItem(DB_KEY,JSON.stringify(d));return d}
function saveData(d){d.lastUpdated=d.lastUpdated||Date.now();localStorage.setItem(DB_KEY,JSON.stringify(d))}
function getDB(){return DB||loadData()}

var DB=getDB(),currentUser=null,isAdmin=false,sortAsc=false,locFilter='',isListening=false,recognition=null,finalTranscript='',pendingNewLoc=null,userStoppedRecognition=false,pendingContext=null;
var iB=document.getElementById('invBody'),rB=document.getElementById('recipeBody'),iC=document.getElementById('invCount'),rC=document.getElementById('recipeCount');
var sD=document.getElementById('statusDot'),sT=document.getElementById('statusText'),vC=document.getElementById('voiceCard'),rT=document.getElementById('recogText'),aR=document.getElementById('analysisResult');
var lL=document.getElementById('logList'),mB=document.getElementById('micBtn'),fL=document.getElementById('fabLabel'),tE=document.getElementById('toast'),tTimer=null;
var mO=document.getElementById('modalOverlay'),mC=document.getElementById('modalContent'),nC=document.getElementById('newLocConfirm'),nT=document.getElementById('newLocText');

function toast(m){tE.textContent=m;tE.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(function(){tE.classList.remove('show')},2500)}
function setStatus(mo,t){sD.className='status-dot '+mo;sT.textContent=t}
async function addLog(msg,tp){

function fmtDur(c){
  var t=typeof c==='number'?c:(typeof c==='string'?Date.parse(c):NaN);
  if(isNaN(t))t=Date.now();
  var d=Date.now()-t;
  var ms=Math.floor(d/1000);
  var mi=Math.floor(ms/60);
  var h=Math.floor(mi/60);
  var da=Math.floor(h/24);
  if(ms<60) return ms+'秒';
  if(mi<60) return mi+'分钟';
  if(h<24) return h+'小时';
  return da+'天';
}

document.getElementById('importExcelBtn').addEventListener('click',function(){

    var reader=new FileReader();

      try{
        var data=new Uint8Array(e.target.result);
        var wb=XLSX.read(data,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var json=XLSX.utils.sheet_to_json(ws);
        if(!json||json.length===0){toast('⚠️ Excel文件为空');return}
        DB=getDB();

        json.forEach(function(row){
          var u=(row.username||row.账号||row.用户名||'').toString().trim();

          var n=(row.name||row.姓名||row.名称||'').toString().trim();
          var r=(row.role||row.角色||'staff').toString().trim();
          if(!u)return;
          if(!p)p='123456';
          if(!n)n=u;
          if(r!=='admin')r='staff';else r='admin';
          if(!DB.accounts.find(function(a){return a.username===u})){
            DB.accounts.push({username:u,password:p,role:r,name:n});
            added++;
          }
        });
        await refreshDB();
        hideModal();
        toast('✅ 已导入 '+added+' 个账号');
      }catch(ex){toast('❌ Excel解析失败: '+ex.message)}
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
});

    if(!res.desc){var dm={add_stock:'进货 ['+(res.item||'')+'，'+(res.qty||'')+'，'+(res.loc||'常温')+']',use_stock:'消耗 '+(res.item||'')+' '+(res.qty||''),set_stock:'设置 '+(res.item||'')+'='+(res.qty||''),delete_stock:'删除 ['+(res.name||'')+']',move_stock:'转移 '+(res.item||'')+' '+(res.qty||'')+' 到'+(res.to_loc||''),add_recipe:'新菜谱 '+(res.name||''),recipe_ingredients:'设置 '+(res.name||'')+' 食材',query:'查询 '+(res.name||''),new_location:'发现 '+(res.loc||''),ask_qty:'询问数量'};res.desc=dm[res.action]||res.action}
    return res
  }catch(e){return{action:'unknown',desc:'AI出错: '+e.message}}
}

function nextItemName(base){
  var same=DB.inventory.filter(function(s){
    return s.name===base||(s.name.length>base.length&&s.name.indexOf(base)===0&&/^\d+$/.test(s.name.substring(base.length)))
  });
  var maxIdx=1;
  same.forEach(function(s){
    var sfx=s.name.substring(base.length);
    if(sfx){var n=parseInt(sfx,10);if(n>maxIdx)maxIdx=n}
  });
  return base+(maxIdx+1)}

function getWarnings(){try{return JSON.parse(localStorage.getItem('liayi_warnings'))||[]}catch(e){return[]}}
function addWarning(id){var ws=getWarnings();if(!ws.includes(id)){ws.push(id);localStorage.setItem('liayi_warnings',JSON.stringify(ws))}}

async function execAI(res,lastInput){
  if(res.action==='unknown'){toast(res.desc);addLog('❌ '+res.desc,'AI');return}
  if(res.action==='ask_qty'){toast('❓ '+(res.prompt||'请告诉我数量'));addLog('❓ AI: '+(res.prompt||'请告诉我数量'),'AI');if(lastInput){pendingContext={userMsg:lastInput,aiReply:res.prompt||'请告诉我数量'}}return}
  if(res.action==='new_location'){pendingNewLoc=res.loc;nT.textContent='检测到新位置「'+res.loc+'」，是否添加？';nC.classList.add('show');addLog('📍 检测到新位置 '+res.loc,'AI');return}
  DB=getDB();var a=res.action,desc=res.desc;
if(a==='add_stock'){var lc=res.loc||'常温',dup=DB.inventory.find(function(s){return s.name===res.item&&s.loc===lc});if(dup){var newName=nextItemName(res.item);DB.inventory.push({id:DB.nextInvId++,name:newName,qty:res.qty,loc:lc,createdAt:Date.now(),_new:true});addLog('✅ 进货 ['+newName+'，'+res.qty+'，'+lc+']','AI')}else{DB.inventory.push({id:DB.nextInvId++,name:res.item,qty:res.qty,loc:lc,createdAt:Date.now(),_new:true});addLog('✅ 进货 ['+res.item+'，'+res.qty+'，'+lc+']','AI')}await sbPost('inventory',{name:newName||res.item,qty:res.qty,loc:lc,created_at:new Date().toISOString()});await refreshDB();render();toast('✅ '+desc);return}
  if(a==='use_stock'){var f=DB.inventory.find(function(s){return s.name===res.item});if(!f){toast('❌ 没有 '+res.item);addLog('❌ 未找到 '+res.item,'AI');return}var sq=f.qty.match(/^(\d+(?:\.\d+)?)(.*)/);var mq=res.qty?res.qty.match(/^(\d+(?:\.\d+)?)(.*)/):null;if(!mq){try{await sbDelete('inventory','id=eq.'+f.id)}catch(e){}await refreshDB();render();toast('🗑️ 消耗完毕 '+desc);addLog('🗑️ 消耗完毕 '+res.item,'AI');return}if(sq&&(sq[2]===mq[2]||!mq[2])){var n=parseFloat(sq[1])-parseFloat(mq[1]);if(n<=0){try{await sbDelete('inventory','id=eq.'+f.id)}catch(e){}await refreshDB();render();toast('🗑️ 消耗完毕 '+desc);addLog('🗑️ 消耗完毕 '+res.item,'AI')}else{try{await sbPatch('inventory',{qty:n+sq[2]},'id=eq.'+f.id)}catch(e){}await refreshDB();render();toast('✅ '+desc);addLog('✅ '+desc,'AI')}}else{toast('⚠️ 单位不一致，未消耗');addLog('⚠️ 单位不一致，未能消耗 '+res.item,'AI')}return}
  if(a==='set_stock'){var f=DB.inventory.find(function(s){return s.name===res.item});if(!f){toast('❌ 没有 '+res.item);addLog('❌ 未找到 '+res.item,'AI');return}try{await sbPatch('inventory',{qty:res.qty},'id=eq.'+f.id)}catch(e){}await refreshDB();render();toast('✅ '+desc);addLog('✅ '+desc,'AI');return}
  if(a==='delete_stock'){DB=getDB();var items=DB.inventory.filter(function(s){return s.name===res.name});if(items.length===0){toast('❌ 没有 '+res.name);addLog('❌ 未找到 '+res.name,'AI');return}items.forEach(function(it){saveUndoItem({name:it.name,qty:it.qty,loc:it.loc,created_at:it.created_at||it.createdAt,ts:Date.now()})});try{await sbDelete('inventory','name=eq.'+encodeURIComponent(res.name))}catch(e){}await refreshDB();render();toast('🗑️ '+desc);addLog('🗑️ '+desc,'AI');return}
if(a==='move_stock'){var src=DB.inventory.find(function(s){return s.name===res.item&&s.loc===res.from_loc});if(!src){toast('❌ 未找到');return}if(!res.qty){try{await sbPatch('inventory',{loc:res.to_loc},'id=eq.'+src.id)}catch(e){}var ws=getWarnings();if(ws.includes(src.id)){ws=ws.filter(function(id){return id!==src.id});localStorage.setItem('liayi_warnings',JSON.stringify(ws))}await refreshDB();render();toast('✅ '+desc);addLog('✅ '+desc,'AI');return}var sq=src.qty.match(/^(\d+(?:\.\d+)?)(.*)/);var mq=res.qty.match(/^(\d+(?:\.\d+)?)(.*)/);if(sq&&mq&&sq[2]===mq[2]){var n=parseFloat(sq[1])-parseFloat(mq[1]);if(n<=0){try{await sbDelete('inventory','id=eq.'+src.id)}catch(e){}}else{try{await sbPatch('inventory',{qty:n+sq[2]},'id=eq.'+src.id)}catch(e){}}var newName=nextItemName(res.item);var payload={name:newName,qty:res.qty,loc:res.to_loc};if(src.created_at)payload.created_at=src.created_at;try{await sbPost('inventory',payload)}catch(e){}var ws=getWarnings();if(ws.includes(src.id)){ws=ws.filter(function(id){return id!==src.id});localStorage.setItem('liayi_warnings',JSON.stringify(ws))}await refreshDB();render();toast('✅ '+desc);addLog('✅ '+desc,'AI');return}else{addWarning(src.id);var newName=nextItemName(res.item);var payload={name:newName,qty:res.qty,loc:res.to_loc};if(src.created_at)payload.created_at=src.created_at;try{await sbPost('inventory',payload)}catch(e){}await refreshDB();render();toast('⚠️ 部分食材已转移，'+src.name+'('+src.loc+') 已加❗标记');addLog('⚠️ 部分食材已转移 '+desc,'AI');return}}
  if(a==='add_recipe'){if(DB.recipes.find(function(r){return r.name===res.name})){toast('⚠️ 菜谱已存在');return}try{await sbPost('recipes',{name:res.name,ingredients:'（待补充）'})}catch(e){}await refreshDB();render();toast('➕ '+desc);addLog('➕ '+desc,'AI');return}
  if(a==='recipe_ingredients'){var f=DB.recipes.find(function(r){return r.name===res.name});if(f)try{if(f){await sbPatch('recipes',{ingredients:res.ingredients},'id=eq.'+f.id)}else{await sbPost('recipes',{name:res.name,ingredients:res.ingredients})}}catch(e){}await refreshDB();render();toast('✅ '+desc);addLog('✅ '+desc,'AI');return}
  if(a==='query'){var matches=DB.inventory.filter(function(s){return s.name.indexOf(res.name)!==-1});if(matches.length>0){var brief=matches.map(function(s){return s.name+' '+s.qty+'('+s.loc+')'}).join(', ');toast('🔍 '+matches.length+' 项');addLog('🔍 '+res.name+' '+matches.length+' 项: '+brief, 'AI')}else{toast('🔍 '+res.name);addLog('🔍 '+res.name, 'AI')}return}
}
// Voice Recognition
function startListening(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('idle','❌ 浏览器不支持语音');mB.style.display='none';return}
  setStatus('idle','请求麦克风权限...');
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    s.getTracks().forEach(function(t){t.stop()});
    finalTranscript='';isListening=true;userStoppedRecognition=false;aR.innerHTML='';vC.classList.remove('show');
    var r=new SR();r.lang='zh-CN';r.continuous=true;r.interimResults=true;r.maxAlternatives=1;
    r.onstart=function(){setStatus('listening','🎤 聆听中... 再次点击停止');mB.classList.add('listening');mB.textContent='🔴';fL.textContent='点击停止';fL.classList.add('active')};
    r.onresult=function(e){var im='';for(var i=e.resultIndex;i<e.results.length;i++){var t=e.results[i][0].transcript;if(e.results[i].isFinal)finalTranscript+=t;else im+=t}rT.textContent=finalTranscript+im;vC.classList.add('show')};
    r.onerror=function(e){if(e.error==='not-allowed'){setStatus('idle','⚠️ 需允许麦克风');toast('⚠️ 需要麦克风权限')}stopListening(true)};
    r.onend=function(){if(isListening&&!userStoppedRecognition){try{r.start()}catch(e){}}};recognition=r;r.start()})
  .catch(function(){setStatus('idle','⚠️ 麦克风权限被拒绝');toast('⚠️ 请在浏览器中允许麦克风权限')})}

async function stopListening(quiet){
  isListening=false;userStoppedRecognition=true;if(recognition){try{recognition.stop()}catch(e){}recognition=null}
  mB.classList.remove('listening');mB.textContent='🎤';fL.textContent='点击说话';fL.classList.remove('active');
  if(!quiet&&finalTranscript.trim()){
    aR.innerHTML='<div class="sp-wrap"><div class="spinner"></div><span class="sp-label">DeepSeek AI 分析中...</span></div>';
    setStatus('processing','🤖 AI分析中...');
try{var r=await aiAnalyze(finalTranscript,pendingContext);pendingContext=null;var results=Array.isArray(r)?r:[r];var lastResult=Array.isArray(r)?r[0]:r;var ie=lastResult.action==='unknown';var si=ie?'<span class="icon-result fail">✕</span>':'<span class="icon-result ok">✓</span>';
      var h='<div style="display:flex;align-items:center">'+si+' <span>📝 '+lastResult.desc+'</span></div>';
      if(lastResult.action==='new_location')h+='<div style="margin-top:4px"><span class="tag">新位置</span> <span class="key">'+lastResult.loc+'</span></div>';
      else if(lastResult.action==='ask_qty')h+='<div style="margin-top:4px"><span class="tag">追问</span> '+lastResult.prompt+'</div>';
      aR.innerHTML=h;setStatus('done','✅ 已完成');if(typeof results!=='undefined'&&results)results.forEach(function(item){execAI(item,finalTranscript)})}
    catch(e){aR.innerHTML='<div><span style="color:#e74c3c">❌</span> <span>AI请求失败: '+e.message+'</span></div>';setStatus('idle','❌ 分析失败')}}
  else if(!quiet){setStatus('idle','就绪，点击 🎤 开始语音输入')}}

mB.addEventListener('click',function(){if(isListening)stopListening(false);else startListening()});

// Log display: filter by 2 weeks, show max 4
var logShowAll=false;
function renderLogs(){
  DB=getDB();
  var twoWeeksAgo=Date.now()-14*24*60*60*1000;
  var filtered=DB.logs.filter(function(l){return l.ts&&l.ts>twoWeeksAgo||!l.ts});var filtered=filtered.sort(function(a,b){return(b.ts||0)-(a.ts||0)});
  var shown=logShowAll?filtered:filtered.slice(0,4);
  lL.innerHTML='';
  if(shown.length===0){lL.innerHTML='<div class="empty-msg">暂无操作记录</div>';return}
  var undos=getUndoItems();
  shown.forEach(function(l){
    var d=document.createElement('div');d.className='log-item';
    var un=l.user||'系统';
    var tag=l.op?'<span class="op-tag">['+l.op+']</span>':'';
    var msg=l.msg;
    var undoBtn='';
    if(l.msg.indexOf('删除')!==-1&&l.msg.indexOf('撤回')===-1){
      var match=l.msg.match(/删除\s*\[(.+?)，(.+?)，(.+?)\]/);
      if(match){
        var undoItem=undos.find(function(x){
          return x.name===match[1].trim()&&Date.now()-x.ts<300000
        });
        if(undoItem)undoBtn='<button class="undo-btn" data-undoid="'+undoItem.undoId+'" style="font-size:11px;color:#fff;background:#e85d04;border:none;border-radius:6px;padding:2px 8px;margin-left:6px;cursor:pointer">撤回</button>'
      }
    }
    d.innerHTML='<span class="time">'+l.time+'</span><span class="user">'+un+'</span>'+tag+'<span class="msg">'+msg+'</span>'+undoBtn;
    lL.appendChild(d)})
  document.querySelectorAll('.undo-btn').forEach(function(b){b.addEventListener('click',function(){undoDelete(this.getAttribute('data-undoid'))})})
}
